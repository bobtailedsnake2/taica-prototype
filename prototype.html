/* ─── TruncatedReason ───────────────────────────────────────────────────── */
// Root cause of timing bug: the single ref switches between the unconstrained
// div and the truncated div when isOver changes, so a deferred re-measure hits
// the truncated div and reads wrong scrollHeight.
//
// Fix: dedicated measurement div (height:0, always present) whose ref never
// switches. Deferred setTimeout re-measures at the TRUE final column width
// (table auto-layout can expand columns after the initial useEffect run).
function TruncatedReason({ text, onReadMore }) {
  const measRef = useRef(null);
  const [isOver, setIsOver] = useState(false);

  useEffect(() => {
    const measure = () => {
      const el = measRef.current;
      if (!el) return;
      const lh = parseFloat(getComputedStyle(el).lineHeight) || 18;
      setIsOver(el.scrollHeight > lh * 2 + 2);
    };
    measure();                         // immediate (may use pre-layout width)
    const t = setTimeout(measure, 0);  // deferred: fires after table layout settles

    // Re-measure whenever the cell's own width changes (browser/window resize,
    // sidebar collapse, table column reflow, etc.) so <查看更多> shows/hides
    // dynamically instead of being locked in from the first render.
    let ro;
    if (typeof ResizeObserver !== 'undefined' && measRef.current) {
      ro = new ResizeObserver(() => measure());
      ro.observe(measRef.current);
    }
    window.addEventListener('resize', measure);

    return () => {
      clearTimeout(t);
      if (ro) ro.disconnect();
      window.removeEventListener('resize', measure);
    };
  }, [text]);

  return (
    <div>
      {/* height:0 keeps it invisible; scrollHeight still = full content height.
          wordBreak:'break-all' must match the visible divs below exactly, otherwise
          the hidden measurement wraps differently than what's shown and isOver is wrong. */}
      <div ref={measRef} aria-hidden="true"
        style={{ fontSize:14, lineHeight:'1.43', height:0, overflow:'hidden', wordBreak:'break-all' }}
      >{text}</div>

      {isOver ? (
        <div style={{ fontSize:14, color:'#333', lineHeight:'1.43', overflow:'hidden', maxHeight:'2.86em', wordBreak:'break-all' }}>
          <span style={{ float:'right', clear:'right', height:'1.43em', width:'1px', display:'block' }} />
          <span style={{ float:'right', clear:'right' }}>
            {'... '}
            <button onClick={onReadMore} style={{ background:'none', border:'none', cursor:'pointer', padding:0, fontSize:12, color:'#757575', fontFamily:'inherit', whiteSpace:'nowrap' }}>&lt;查看更多&gt;</button>
          </span>
          {text}
        </div>
      ) : (
        <div style={{ fontSize:14, color:'#333', lineHeight:'1.43', wordBreak:'break-all' }}>{text}</div>
      )}
    </div>
  );
}

    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const hasValue = value !== '' && value !== null && value !== undefined;
  const displayLabel = options.find(o => o.value === value)?.label || '';
  const floated = hasValue || open;

  return (
    <div ref={ref} style={{ position:'relative', width, display:'inline-block', verticalAlign:'top' }}>
      <div
        onClick={() => setOpen(p => !p)}

          outlineOffset:-1,

      >
        <span style={{
          position:'absolute',
          left:10,
          top: floated ? 0 : '50%',
          transform: floated ? 'translateY(-50%)' : 'translateY(-50%)',
          marginTop: floated ? -1 : 0,
          fontSize: floated ? 12 : 14,
          color: open ? '#0099cc' : floated ? 'rgba(0,0,0,0.6)' : 'rgba(0,0,0,0.6)',
          background: floated ? 'white' : 'transparent',
          padding: floated ? '0 4px' : 0,
          lineHeight: 1,
          transition:'font-size 0.1s, top 0.1s, color 0.1s',
          pointerEvents:'none',
          whiteSpace:'nowrap',
        }}>
          {label}
        </span>
        <span style={{ fontSize:14, color: hasValue ? '#333' : 'transparent', userSelect:'none', minWidth:4 }}>
          {hasValue ? displayLabel : ' '}
        </span>
        <span style={{
          position:'absolute', right:8, top:'50%',
          transform:`translateY(-50%) rotate(${open ? 180 : 0}deg)`,
          transition:'transform 0.15s',
          color:'rgba(0,0,0,0.54)',
          fontSize:20, lineHeight:1,
          display:'flex', alignItems:'center',
        }}>▾</span>
      </div>

      {open && (
        <div style={{
          position:'absolute', top:'calc(100% + 2px)', left:0, minWidth:'100%',
          background:'white', borderRadius:4,
          boxShadow:'0 2px 8px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.06)',
          zIndex:9999, overflow:'hidden', paddingTop:4, paddingBottom:4,
        }}>
          {options.map(opt => (
            <div
              key={opt.value}
              onMouseDown={e => { e.preventDefault(); onChange(opt.value); setOpen(false); }}
              style={{
                padding:'10px 16px', fontSize:14, cursor:'pointer',
                background: value === opt.value ? 'rgba(0,153,204,0.08)' : 'transparent',

              onMouseLeave={e => { e.currentTarget.style.background = value === opt.value ? 'rgba(0,153,204,0.08)' : 'transparent'; }}
            >
              {opt.label}
              {value === opt.value && <span style={{display:'flex', color:'#0099cc'}}><CheckIcon /></span>}

/* ─── MUI-style TextField ─────────────────────────────────────────────────── */
function MuiTextField({ label, value, onChange, onKeyDown, type='text', error, helperText, disabled, multiline, rows, fillHeight, style:outerSt }) {
  const [focused, setFocused] = useState(false);
  const hasValue = value !== '' && value !== undefined && value !== null;
  const alwaysFloat = type === 'datetime-local';
  const floated = focused || hasValue || alwaysFloat;
  const isError = !!error;
  const borderColor = isError ? '#d32f2f' : focused ? '#0099cc' : 'rgba(0,0,0,0.23)';
  const labelColor = isError ? '#d32f2f' : focused ? '#0099cc' : 'rgba(0,0,0,0.6)';
  const labelTransform = floated
    ? 'translateY(-50%)'
    : multiline ? 'translateY(14px)' : 'translateY(calc(20px - 50%))';
  const sharedStyle = {
    display:'block', width:'100%', fontSize:14, border:'none', outline:'none',
    background:'transparent', borderRadius:4, fontFamily:'inherit',

  return (
    <div style={{ position:'relative', display: fillHeight ? 'flex' : 'inline-block', flexDirection: fillHeight ? 'column' : undefined, width:'100%', verticalAlign:'top', ...(outerSt||{}) }}>
      <div style={{
        position:'relative', borderRadius:4,
        border: `1px solid ${borderColor}`,
        background: disabled ? 'rgba(0,0,0,0.02)' : 'white',

        outlineOffset: -1,
        transition: 'border-color 0.1s',
        ...(fillHeight ? {display:'flex', flexDirection:'column', flex:1} : {}),
      }}>
        {label && <span style={{
          position:'absolute', left:10, top:0, zIndex:1,
          transform: labelTransform,
          fontSize: floated ? 12 : 14,
          color: labelColor,
          background: 'white',
          padding: '0 4px',
          lineHeight: 1,
          transition: 'font-size 0.15s, transform 0.15s, color 0.15s',
          pointerEvents: 'none',
          whiteSpace: 'nowrap',
        }}>{label}</span>}
        {multiline ? (
          <textarea
            value={value}
            onChange={onChange}
            onKeyDown={onKeyDown}
            onFocus={() => setFocused(true)}
            onBlur={() => setFocused(false)}
            disabled={disabled}
            rows={rows}
            style={{ ...sharedStyle, padding:'14px 14px 8px', resize: fillHeight ? 'none' : 'vertical', ...(fillHeight ? {flex:1} : {}) }}
          />
        ) : (
          <input
            type={type}
            value={value}
            onChange={onChange}
            onKeyDown={onKeyDown}
            onFocus={() => setFocused(true)}
            onBlur={() => setFocused(false)}
            disabled={disabled}
            style={{ ...sharedStyle, height:40, padding:'8.5px 14px' }}

      {helperText && <p style={{ fontSize:12, color: isError ? '#d32f2f' : 'rgba(0,0,0,0.6)', margin:'3px 0 0 14px' }}>{helperText}</p>}
    </div>
  );
}

/* ─── Export Split Button ────────────────────────────────────────────────── */
function ExportSplitButton({ allRows, filteredRows }) {
  const [open, setOpen] = useState(false);
  const [selectedIdx, setSelectedIdx] = useState(0);
  const ref = useRef();

  const options = ['匯出整份名單', '匯出目前的顯示內容'];

  useEffect(() => {
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  // 點擊 menu 選項（或左側主按鈕）直接匯出 xlsx，不是只切換按鈕顯示的文字。
  const doExport = idx => {
    const rows = idx === 0 ? allRows : filteredRows;
    if (!window.XLSX || !rows || rows.length === 0) return;
    const ws = window.XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = Object.keys(rows[0] || {}).map(k => ({ wch: k === '停修原因' ? 40 : 14 }));
    const wb = window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb, ws, '停修申請名單');
    const stamp = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    window.XLSX.writeFile(wb, `停修申請_${options[idx] === '匯出整份名單' ? '整份名單' : '目前顯示內容'}_${stamp}.xlsx`);
  };

  const base = { color:'#0099cc', background:'transparent', border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:500 };

  return (
    <div ref={ref} style={{ position:'relative', display:'inline-flex' }}>
      <div style={{ display:'inline-flex', border:'1px solid rgba(0,153,204,0.5)', borderRadius:4 }}>
        <button onClick={() => { setSelectedIdx(selectedIdx); doExport(selectedIdx); }} style={{ ...base, padding:'6px 16px', fontSize:14, borderRight:'1px solid rgba(0,153,204,0.5)' }}>
          {options[selectedIdx]}
        </button>
        <button onClick={() => setOpen(p => !p)} style={{ ...base, padding:'4px 8px', display:'flex', alignItems:'center' }}>
          <span style={{ fontSize:18, lineHeight:1, display:'block' }}>▾</span>
        </button>
      </div>
      {open && (
        <div style={{ position:'absolute', top:'calc(100% + 2px)', right:0, background:'white', borderRadius:4, boxShadow:'0px 5px 5px -3px rgba(0,0,0,0.2), 0px 8px 10px 1px rgba(0,0,0,0.14), 0px 3px 14px 2px rgba(0,0,0,0.12)', zIndex:9999, padding:'8px 0', whiteSpace:'nowrap' }}>
          {options.map((opt, i) => (
            <div
              key={opt}
              onMouseDown={() => { setSelectedIdx(i); setOpen(false); doExport(i); }}
              style={{ padding:'6px 16px', fontSize:14, color:'#333', cursor:'pointer', background: i===selectedIdx ? 'rgba(0,153,204,0.04)' : 'transparent' }}
              onMouseEnter={e => e.currentTarget.style.background = i===selectedIdx ? 'rgba(0,153,204,0.08)' : 'rgba(0,0,0,0.04)'}
              onMouseLeave={e => e.currentTarget.style.background = i===selectedIdx ? 'rgba(0,153,204,0.04)' : 'transparent'}
            >
              {opt}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─── QuillEditor ────────────────────────────────────────────────────────── */
/* fill=true 讓編輯器撐滿父層剩餘高度（父層需為 flex column + minHeight:0），
   對應 Figma node 515:24665（批次編輯班別設定）中 QuillEditor 一路都是
   sizing: vertical=fill，不應該留一小塊固定高度、下方空白。 */
function QuillEditor({ value, onChange, placeholder, disabled, height, fill }) {
  const containerRef = useRef(null);
  const quillRef = useRef(null);
  const lastValRef = useRef(value);

  useEffect(() => {
    if (!containerRef.current || quillRef.current) return;
    const q = new window.Quill(containerRef.current, {
      theme: 'snow',
      placeholder: placeholder || '請輸入注意事項...',
      modules: {
        toolbar: [
          ['bold', 'italic', 'underline', 'strike'],
          [{ color: [] }, { background: [] }],
          [{ list: 'ordered' }, { list: 'bullet' }, { indent: '-1' }, { indent: '+1' }],
          ['link'],
        ],
      },
    });
    if (value) q.setContents(q.clipboard.convert(value));
    q.on('text-change', () => {
      const html = q.root.innerHTML;
      const out = (html === '<p><br></p>' || html === '') ? '' : html;
      lastValRef.current = out;
      onChange(out);
    });
    if (disabled) q.enable(false);
    if (height) { q.root.style.minHeight = height + 'px'; q.root.style.height = height + 'px'; q.root.style.overflowY = 'auto'; }
    if (fill) {
      q.container.style.flex = '1';
      q.container.style.minHeight = '0';
      q.container.style.display = 'flex';
      q.container.style.flexDirection = 'column';
      q.root.style.flex = '1';
      q.root.style.minHeight = '0';
      q.root.style.height = 'auto';
      q.root.style.overflowY = 'auto';
    }
    quillRef.current = q;
    return () => { quillRef.current = null; };
  }, []);

  useEffect(() => {
    if (quillRef.current) quillRef.current.enable(!disabled);
  }, [disabled]);

  useEffect(() => {
    // 修正：dangerouslyPasteHTML(index, html) 是「插入」不是「取代」，若這個 effect
    // 被觸發多次（例如父層重新渲染出新的 sec/value 參考），內容會不斷疊加、字數暴增。
    // setContents(...) 會整個取代編輯器內容，才是安全的外部同步方式。
    if (quillRef.current && value !== lastValRef.current) {
      const q = quillRef.current;
      q.setContents(q.clipboard.convert(value || ''));
      lastValRef.current = value;
    }
  }, [value]);

  return <div ref={containerRef} style={{ borderRadius: 4, overflow: 'hidden', ...(fill ? { display:'flex', flexDirection:'column', flex:1, minHeight:0 } : {}) }} />;
}

/* 注意事項字數上限 — 依 Figma node 1111:48188（3.2.3.7 StepsDialog 注意事項字數太多）。
   計數以純文字（去除 HTML tag）為準，避免加粗體/顏色等格式標籤誤增字數。 */
const NOTICE_LIMIT = 5000;
const plainLen = html => (html || '').replace(/<[^>]+>/g, '').replace(/&nbsp;/g, ' ').length;
function NoticeCounter({ value, limit = NOTICE_LIMIT }) {
  const len = plainLen(value);
  const over = len > limit;
  return (

function MuiTooltip({ title, children }) {
  const [show, setShow] = useState(false);
  const [pos, setPos] = useState({ top: 0, left: 0 });
  const ref = React.useRef(null);
  if (!title) return children;
  const handleMouseEnter = () => {
    if (ref.current) {
      const r = ref.current.getBoundingClientRect();
      setPos({ top: r.top + r.height / 2, left: r.right + 8 });
    }
    setShow(true);
  };
  return (
    <div ref={ref} style={{ display:'inline-flex', alignItems:'center' }}
      onMouseEnter={handleMouseEnter}
      onMouseLeave={() => setShow(false)}
    >
      {children}
      {show && ReactDOM.createPortal(
        <div style={{
          position:'fixed', left: pos.left, top: pos.top,
          transform:'translateY(-50%)',
          background:'#ffffff', color:'#333333',
          fontSize:16, fontWeight:400, padding:'4px 8px',
          borderRadius:4, whiteSpace:'nowrap', pointerEvents:'none',
          zIndex:9999, lineHeight:1.5, letterSpacing:'0.15px',

  );
}

function AddDlg({ onClose, onDone, courses }) {
  const [inp, setInp]         = useState('');
  const [added, setAdded]     = useState([]);
  const [errInline, setErrInline] = useState('');
  const [dlgAlert, setDlgAlert]   = useState(null);
  const [st, setSt] = useState('');
  const [et, setEt] = useState('');
  const [ap, setAp] = useState('');
  const [notes, setNotes] = useState('');

  const clearErrs = () => { setErrInline(''); setDlgAlert(null); };

  const addC = () => {
    const id = inp.trim();
    if (!id) return;
    if (!/^\d+$/.test(id)) { setErrInline('請輸入半形數字'); setDlgAlert(null); return; }
    setErrInline('');
    if (added.some(c => c.courseId === id)) { setDlgAlert({ type:'error', msg:'已加入此課程' }); return; }
    if (courses && courses.some(c => c.courseId === id)) { setDlgAlert({ type:'error', msg:'已將此課程啟用停修功能' }); return; }
    const d = CDB[id];
    if (!d) { setDlgAlert({ type:'warning', msg:'查找不到此 ID 的課程' }); return; }
    setAdded(p => [...p, { id:'t'+Date.now(), courseId:id, semester:d.s, courseName:d.n }]);
    setInp('');
    setDlgAlert({ type:'success', msg:'已成功加入課程' });
    setTimeout(() => setDlgAlert(a => a?.type==='success' ? null : a), 3000);
  };

  const tE = mkTErr(st, et, ap);
  const anyTimeErr = st && et && ap && (tE('st') || tE('et') || tE('ap'));
  const notesOver = plainLen(notes) > NOTICE_LIMIT;
  const canDone = added.length > 0 && st && et && ap && !anyTimeErr && !notesOver;

  const ALERT_CFG = {
    success: { bg:'#e8f5e9', Icon:CheckCircleIcon, c:'#2e7d32' },

      <AdminBtn onClick={() => canDone && onDone({courses:added,st,et,ap,notes})} disabled={!canDone}>完成</AdminBtn>
    </>
  );

  return (
    <AdminDlg title="新增開放停修課程" onClose={onClose} footer={footer} overlayAlert={alertEl}>
      <div style={{display:'flex',flexDirection:'column',gap:40,paddingTop:8}}>

        {/* ── Section 1: Course Input ── */}

          <div style={{display:'flex',gap:16,alignItems:'flex-start'}}>
            <MuiTextField
              label="課程 ID"
              value={inp}
              onChange={ev => { setInp(ev.target.value); clearErrs(); }}
              onKeyDown={ev => ev.key==='Enter' && addC()}
              error={!!errInline}
              helperText={errInline || ''}

            <AdminBtn onClick={addC} variant="outline" style={{marginTop:4,flexShrink:0}}>加入</AdminBtn>

          <p style={{fontSize:12,color:'rgba(0,0,0,0.45)',margin:0}}>Prototype 輸入 61113、57672 模擬新增課程</p>

/* ─── AdminEditView ──────────────────────────────────────────────────────── */
function AdminEditView({ course, secs, onUpdateSec, onEditSec, onBatchSecs, onBatchClose, onUpdate, onBack, showToast }) {
  const [search, setSearch]     = useState('');
  const [sel,    setSel]        = useState([]);
  const [switchSortDir, setSwitchSortDir] = useState(1); // 1 = 開啟在上（預設）, -1 = 關閉在上
  const hasSel    = sel.length > 0;

  /* stable 申請數 — matches Figma sample data。COUNT_MAP 是用共用的班別範本 id（'1'~'7'）查表，
     只對原始 5 門 demo 課程（INIT_COURSES，id '1'~'5'）有意義；新增的課程（id 為亂數字串）
     一律回傳 0，避免誤套用到別的課程的假資料。 */
  const isOriginalCourse = ['1','2','3','4','5'].includes(course.id);
  const COUNT_MAP = {'1':12,'2':0,'3':3,'4':5,'5':28,'6':0,'7':0};
  const getCount = id => isOriginalCourse ? (COUNT_MAP[id] !== undefined ? COUNT_MAP[id] : 0) : 0;

  /* 單一列表：不分 accordion，依搜尋字串過濾，再依「停修開關」排序（穩定排序，同組內維持原順序） */
  const filteredSecs = secs.filter(s => !search.trim() || s.name.includes(search));
  const sortedSecs   = [...filteredSecs].sort((a, b) => switchSortDir === 1 ? (b.vis - a.vis) : (a.vis - b.vis));

  const allC  = filteredSecs.length > 0 && filteredSecs.every(s => sel.includes(s.id));
  const indet = !allC && filteredSecs.some(s => sel.includes(s.id));
  const toggleAll = c => {
    const ids = filteredSecs.map(s => s.id);
    setSel(p => c ? [...new Set([...p, ...ids])] : p.filter(x => !ids.includes(x)));
  };

  /* 欄位寬度依 Figma frame（node 516:29233）調整：班別/申請數/停修開關/編輯 為固定寬，
     其餘日期時間類欄位為彈性（fill）欄位，不設寬度、平分剩餘空間 */
  const COLS = [
    ['班別', null], ['申請開始時間', null], ['申請截止時間', null], ['教師審核期限', null],
    ['最後操作人', null], ['最後操作時間', null], ['申請數', 80],
  ];

  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      {/* Breadcrumb */}
      <div style={{fontSize:14,display:'flex',alignItems:'center',gap:6}}>
        <button onClick={onBack} className="mui-btn mui-text" style={{background:'none',border:'none',cursor:'pointer',color:'rgba(0,0,0,0.6)',fontSize:14,padding:'2px 4px'}}>停修申請設定</button>
        <span style={{color:'rgba(0,0,0,0.35)',margin:'0 2px'}}>/</span>
        <span style={{color:'rgba(0,0,0,0.87)',fontSize:14,padding:'2px 4px'}}>班別設定</span>
      </div>
      <h2 style={{fontSize:34,fontWeight:400,color:'rgba(0,0,0,0.87)',margin:0}}>{course.courseName}</h2>

      {/* SearchBar */}
      <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
        <MuiTextField label="搜尋班別" value={search} onChange={ev=>setSearch(ev.target.value)} style={{width:220}}/>
        <div style={{width:1,height:36,background:'rgba(0,0,0,0.12)',flexShrink:0}}/>
        <AdminBtn onClick={()=>onBatchSecs(secs.filter(s=>sel.includes(s.id)))} disabled={!hasSel} icon="Edit">批次編輯設定</AdminBtn>
      </div>

      {/* 班別列表 — 單一列表，不分 accordion；預設開啟班別在上、關閉班別在下 */}
      <div style={{border:'1px solid rgba(0,0,0,0.12)',borderRadius:4,overflow:'auto'}}>
        <table style={{width:'100%',tableLayout:'fixed',borderCollapse:'collapse',minWidth:1020}}>
          <thead><tr style={{background:'#f5f5f5',height:48}}>
            <th style={{width:44,padding:'0 8px',textAlign:'center'}}>
              <TriCb checked={allC} indet={indet} onChange={ev=>toggleAll(ev.target.checked)}/>
            </th>
            {COLS.map(([h, w])=>(
              <th key={h} style={{width:w||undefined,textAlign:'left',padding:'0 8px',fontSize:13,fontWeight:500,whiteSpace:'nowrap'}}>{h}</th>
            ))}
            <th onClick={()=>setSwitchSortDir(d=>d*-1)} style={{width:120,textAlign:'left',padding:'0 16px',fontSize:13,fontWeight:500,cursor:'pointer',userSelect:'none'}}>
              <span style={{display:'inline-flex',alignItems:'center',gap:4}}>
                停修開關
                <span style={{display:'inline-flex',transform:switchSortDir===1?'rotate(0deg)':'rotate(180deg)',transition:'transform .15s'}}>
                  <ArrowDownIcon size={18} color="rgba(0,0,0,0.5)"/>
                </span>
              </span>
            </th>
            <th style={{width:50,textAlign:'left',padding:'0 8px',fontSize:13,fontWeight:500}}>編輯</th>
          </tr></thead>
          <tbody>{sortedSecs.map(sec=>(
            <tr key={sec.id} style={{height:50,borderTop:'1px solid rgba(0,0,0,0.06)',background:sel.includes(sec.id)?'rgba(0,153,204,0.08)':'white'}}>
              <td style={{padding:'0 8px',textAlign:'center',width:44}}>
                <input type="checkbox" checked={sel.includes(sec.id)} onChange={ev=>setSel(p=>ev.target.checked?[...p,sec.id]:p.filter(x=>x!==sec.id))} style={{accentColor:AC,width:17,height:17,cursor:'pointer'}}/>
              </td>
              <td style={{padding:'0 8px',fontSize:14,lineHeight:'1.43',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sec.name}</td>
              <td style={{padding:'0 8px',fontSize:14,lineHeight:'1.43',whiteSpace:'nowrap'}}>{sec.st}</td>
              <td style={{padding:'0 8px',fontSize:14,lineHeight:'1.43',whiteSpace:'nowrap'}}>{sec.et}</td>
              <td style={{padding:'0 8px',fontSize:14,lineHeight:'1.43',whiteSpace:'nowrap'}}>{sec.ad}</td>
              <td style={{padding:'0 8px',fontSize:14,lineHeight:'1.43',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sec.op}</td>
              <td style={{padding:'0 8px',fontSize:14,lineHeight:'1.43',whiteSpace:'nowrap'}}>{sec.ot}</td>
              <td style={{padding:'0 8px',fontSize:14,lineHeight:'1.43'}}>{getCount(sec.id)}</td>
              <td style={{padding:'8px',width:120}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <Tog on={sec.vis} onChange={()=>{
                    setSel(p => [...new Set([...p, sec.id])]);
                    if(sec.vis){
                      if(getCount(sec.id)>0){ onBatchClose([sec]); }
                      else { onUpdate(secs.map(s=>s.id===sec.id?{...s,vis:false}:s)); showToast('已成功關閉班別停修功能'); }
                    } else { onUpdate(secs.map(s=>s.id===sec.id?{...s,vis:true}:s)); showToast('已成功開啟班別停修功能'); }
                  }}/>
                  <span style={{fontSize:14,lineHeight:'1.43',color:'#333',whiteSpace:'nowrap'}}>{sec.vis?'開啟':'關閉'}</span>
                </div>
              </td>
              <td style={{padding:'0 8px',width:50}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'flex-end'}}>
                  <button onClick={()=>onEditSec(sec)} className="mui-btn mui-icon" style={{background:'none',border:'none',cursor:'pointer',padding:4,display:'inline-flex',color:'rgba(0,0,0,0.5)'}}><EditIcon size={18}/></button>
                </div>
              </td>
            </tr>
          ))}</tbody>
        </table>
        {sortedSecs.length===0&&<div style={{padding:'16px',fontSize:14,color:'rgba(0,0,0,0.6)',textAlign:'center'}}>找不到符合條件的班別</div>}
      </div>
    </div>
  );
}

  );
}

/* ─── Main App ───────────────────────────────────────────────────────────── */
function App() {
  const [view, setView] = useState('student');
  const [studentApp, setStudentApp] = useState({ status:'未申請', reason:'' });
  const [students, setStudents] = useState(INIT_STUDENTS);
  const [selected, setSelected] = useState([]);
  const [searchName, setSearchName] = useState('');
  const [classFilter, setClassFilter] = useState('全部');
  const [statusFilter, setStatusFilter] = useState('待審核');
  const [confirmOpen, setConfirmOpen] = useState(false);
  const [pendingStatus, setPendingStatus] = useState(null);
  const [batchComment, setBatchComment] = useState('');
  const [reviewOpen, setReviewOpen] = useState(false);
  const [currentStudent, setCurrentStudent] = useState(null);
  const [dlgStatus, setDlgStatus] = useState('');
  const [dlgComment, setDlgComment] = useState('');
  const [initDlgStatus, setInitDlgStatus] = useState('');
  const [initDlgComment, setInitDlgComment] = useState('');
  const [teacherN, setTeacherN] = useState(1);
  const [success, setSuccess] = useState(false);
  const [successMsg, setSuccessMsg] = useState('審核結果已成功送出！');
  const [frozenOrder, setFrozenOrder] = useState(null);

  // ── Admin state ────────────────────────────────────────────────────────────
  const [adminCourses, setAdminCourses] = useState(INIT_COURSES);
  const [adminCS, setAdminCS] = useState(initCS);
  const [adminView, setAdminView] = useState('list');
  const [adminCurCourse, setAdminCurCourse] = useState(null);
  const [adminSemester, setAdminSemester] = useState('114-2 (2026 Spring)');
  const [adminCSearch, setAdminCSearch] = useState('');
  const [adminAddOpen, setAdminAddOpen] = useState(false);
  const [adminSecDlg, setAdminSecDlg] = useState(null);
  const [adminBatchSecs, setAdminBatchSecs] = useState(null);
  const [adminBatchCloseConf, setAdminBatchCloseConf] = useState(null);
  const [adminCourseCloseConf, setAdminCourseCloseConf] = useState(null);
  const [adminToast, setAdminToast] = useState(null);

  const adminShowToast = (msg) => { setAdminToast(msg); setTimeout(() => setAdminToast(null), 4000); };
  const adminGetSecs = (courseId) => adminCS[courseId] || mkSecs();
  const adminSaveSecs = (courseId, newSecs) => setAdminCS(prev => ({ ...prev, [courseId]: newSecs }));

  // Course-level switch on the admin homepage list — same appCounts used for the 申請數 column
  const adminAppCounts = {'1': students.filter(s=>s.status!=='未申請').length,'2':32,'3':6,'4':105,'5':17};
  const adminToggleCourse = (c) => {
    const isOn = c.vis !== false;
    if (isOn) {
      // 關閉一律跳確認 dialog，不論申請數多少
      setAdminCourseCloseConf(c);
    } else {
      setAdminCourses(prev => prev.map(x => x.id===c.id ? {...x, vis:true} : x));
      adminShowToast('已成功開啟課程停修功能');
    }
  };

  // courseSettings: derive from admin data (course 深度學習, school 國立成功大學)
  const courseSettings = (() => {
    const secs = adminCS['1'] || [];
    return secs.find(s => s.name === '國立成功大學') || secs[0] || { st:'2026/05/04 00:00', et:'2026/05/11 23:59', ad:'2026/05/13 23:59', notes:'' };
  })();

  const getNow = () => { const d=new Date(); return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
  const nextApprover = () => { const n=`教師${teacherN} (教師)`; setTeacherN(p=>p+1); return n; };

  // Look up admin section settings for a given school (from 深度學習 course, id '1')
  const getSecForSchool = (school) => {
    const secs = adminCS['1'] || [];
    return secs.find(s => s.name === school) || { st:'2026/07/01 00:00', et:'2026/07/25 23:59', ad:'2026/08/08 23:59', notes:'' };
  };

  // Derive effective status: if admin deadline for student's school has passed, 待審核 → 逾期審核
  const getEffectiveStatus = (student) => {
    if (student.status !== '待審核') return student.status;
    const sec = getSecForSchool(student.school);
    if (!sec.ad) return student.status;
    const deadline = new Date(sec.ad.replace(/\//g, '-').replace(' ', 'T'));
    return deadline < new Date() ? '逾期審核' : student.status;
  };
  const effectiveStudents = students.map(s => {
    const eff = getEffectiveStatus(s);
    return { ...s, status: eff, _orig: s.status };
  });

  const [studentToast, setStudentToast] = useState(false);
  const handleStudentSubmit = (reason) => {
    setStudentApp({ status:'待審核', reason, applyTime:'2026/05/05 08:35' });
    const ns = { id:students.length+1, name:'陳O佑', school:'國立成功大學', studentId:'成大_F34097391', loginId:'F34097391@mail.ncku.edu.tw', applyTime:'2026/05/05 08:35', deadline:'2026/05/13 23:59', reason, status:'待審核', lastModified:new Date('2026/05/05 08:35').getTime() };
    setStudents(p => [ns, ...p]);
    setStudentToast(true);
    setTimeout(() => setStudentToast(false), 4000);
  };

  const baseFiltered = effectiveStudents.filter(s => {
    const nm = searchName==='' || s.name.includes(searchName);
    const cl = classFilter==='全部' || s.school===classFilter;
    const st = statusFilter==='全部' ||
      (statusFilter==='待審核' && s.status==='待審核') ||
      (statusFilter==='逾期審核' && s.status==='逾期審核') ||
      (statusFilter==='同意停修' && s.status==='同意') ||
      (statusFilter==='不同意停修' && s.status==='不同意');
    return nm && cl && st;
  });

  const filtered = frozenOrder
    ? [
        ...frozenOrder.map(id => baseFiltered.find(s => s.id===id)).filter(Boolean),
        ...baseFiltered.filter(s => !frozenOrder.includes(s.id)),
      ]
    : baseFiltered.sort((a,b) => {
        const d = statusOrder[a.status]-statusOrder[b.status];
        if (d===0) return (b.lastModified||0)-(a.lastModified||0);
        return d;
      });

  // 匯出用的資料列 — 欄位對應表格上看到的欄位，審核期限沿用表格同一套邏輯（逾期審核顯示原始 deadline，否則抓班別設定的教師審核期限）。
  const toExportRow = s => ({
    '學生姓名': s.name,
    '班別': s.school,
    '學號': s.studentId,
    '申請時間': s.applyTime || '',
    '停修原因': s.reason,
    '審核結果': chipLabel[s.status] || s.status,
    '審核期限': s._orig === '逾期審核' ? s.deadline : (getSecForSchool(s.school).ad || ''),
    '審核時間': s.approvalTime || '',
    '審核人': s.approver || '',
  });
  const exportAllRows = effectiveStudents.map(toExportRow);
  const exportFilteredRows = filtered.map(toExportRow);

  const pendingCount = effectiveStudents.filter(s => s.status==='待審核' || s.status==='逾期審核').length;
  const hasAnyApplication = effectiveStudents.some(s => s.status!=='未申請');
  const hasSelections = selected.length > 0 && hasAnyApplication;
  const isSelected = id => selected.includes(id);
  const selectableRows = filtered.filter(s => s.status!=='逾期審核');
  const allSelected = selectableRows.length>0 && selected.length===selectableRows.length;
  const someSelected = selected.length>0 && selected.length<selectableRows.length;

  const handleSelectAll = e => {
    if (e.target.checked) setSelected(selectableRows.map(s => s.id));
    else setSelected([]);
  };
  const toggleSelect = id => {
    const s = effectiveStudents.find(s => s.id===id);
    if (s?.status==='逾期審核') return;
    setSelected(p => p.includes(id) ? p.filter(x => x!==id) : [...p, id]);
  };

  const showSuccess = (reversal = false) => {
    setSuccessMsg(reversal ? '已成功調整停修申請回覆' : '審核結果已成功送出！');
    setSuccess(true);
    setTimeout(() => setSuccess(false), 3000);
  };

  const execBatch = (ns, comment='') => {
    const t=getNow(); const ts=Date.now(); const appr=nextApprover();
    const hasChen = effectiveStudents.some(s => selected.includes(s.id) && s.studentId==='成大_F34097391' && s.status!=='逾期審核');
    const isReversal = effectiveStudents.some(s => selected.includes(s.id) && (s.status==='同意'||s.status==='不同意') && s.status!==ns);
    setStudents(p => p.map(s => {
      if (!selected.includes(s.id) || getEffectiveStatus(s)==='逾期審核') return s;
      const isChen = s.studentId==='成大_F34097391';
      return { ...s, status:ns, approvalTime:isChen?'2026/05/07 12:30':t, approver:appr, lastModified:ts, comment: comment||undefined };
    }));
    if (hasChen) {
      const chen = students.find(s => s.studentId==='成大_F34097391');
      if (chen) setStudentApp({ status:ns, reason:chen.reason, approvalTime:'2026/05/07 12:30', approver:appr, comment: comment||undefined });
    }
    setFrozenOrder(filtered.map(s => s.id));
    setStatusFilter('全部');
    showSuccess(isReversal);
  };

  const batchClick = ns => {
    setPendingStatus(ns);
    setBatchComment(ns === '同意' ? '同意停修' : '不同意停修');
    setConfirmOpen(true);
  };

  const openReview = s => {
    setCurrentStudent(s);
    if (s.status==='待審核') { setDlgStatus(''); setInitDlgStatus(''); setDlgComment(''); setInitDlgComment(''); }
    else {
      const st = (s.status==='同意'||s.status==='不同意') ? s.status : '不同意';
      setDlgStatus(st); setInitDlgStatus(st); setDlgComment(s.comment||''); setInitDlgComment(s.comment||'');
    }
    setReviewOpen(true);
  };
  const closeReview = () => { setReviewOpen(false); setCurrentStudent(null); setDlgStatus(''); setDlgComment(''); };

  const submitReview = () => {
    if (!currentStudent || dlgStatus==='') return;
    const t=getNow(); const ts=Date.now(); const appr=nextApprover();
    const isChen = currentStudent.studentId==='成大_F34097391';
    const isReversal = (initDlgStatus==='同意' && dlgStatus==='不同意') || (initDlgStatus==='不同意' && dlgStatus==='同意');
    setStudents(p => p.map(s => s.id===currentStudent.id ? { ...s, status:dlgStatus, approvalTime:isChen?'2026/05/07 12:30':t, approver:appr, comment:dlgComment, lastModified:ts } : s));
    if (isChen) setStudentApp({ status:dlgStatus, reason:currentStudent.reason, approvalTime:'2026/05/07 12:30', approver:appr, comment:dlgComment });
    setFrozenOrder(filtered.map(s => s.id));
    setStatusFilter('全部');
    closeReview();
    showSuccess(isReversal);
  };

  const submitDisabled = !currentStudent || currentStudent.status==='逾期審核' ||
    dlgComment.length>500 ||
    (currentStudent?.status==='待審核' && dlgStatus==='') ||
    (currentStudent?.status!=='待審核' && dlgStatus===initDlgStatus && dlgComment===initDlgComment);

  /* Select option arrays */
  const classOptions = [
    { value:'全部', label:'全部' },
    { value:'國立臺灣大學', label:'國立臺灣大學' },
    { value:'國立臺灣科技大學', label:'國立臺灣科技大學' },
    { value:'國立清華大學', label:'國立清華大學' },
    { value:'國立陽明交通大學', label:'國立陽明交通大學' },
    { value:'國立成功大學', label:'國立成功大學' },
    { value:'國立中山大學', label:'國立中山大學' },
    { value:'國立中央大學', label:'國立中央大學' },
    { value:'國立臺灣師範大學', label:'國立臺灣師範大學' },
    { value:'國立政治大學', label:'國立政治大學' },
    { value:'國立中興大學', label:'國立中興大學' },
    { value:'南臺科技大學', label:'南臺科技大學' },
    { value:'中國醫藥大學', label:'中國醫藥大學' },
    { value:'逢甲大學', label:'逢甲大學' },
  ];
  const statusOptions = [
    { value:'全部', label:'全部' },
    { value:'待審核', label:'待審核' },
    { value:'逾期審核', label:'逾期審核' },
    { value:'同意停修', label:'同意停修' },
    { value:'不同意停修', label:'不同意停修' },
  ];
  const reviewStatusOptions = [
    { value:'同意停修', label:'同意停修' },
    { value:'不同意停修', label:'不同意停修' },
  ];

  return (
    <div style={{ position:'relative', minHeight:'100vh', background:'white' }}>
      {/* Fixed sidebar — full height, on top of everything */}
      <div style={{ position:'fixed', left:0, top:0, width:84, height:'100vh', background:'#003366', zIndex:20 }} />

      {/* All content shifted right of the sidebar */}
      <div style={{ marginLeft:84, display:'flex', flexDirection:'column', minHeight:'100vh' }}>

        {/* Sticky nav */}
        <div style={{ height:72, background:'white', borderBottom:'1px solid #ccc', display:'flex', alignItems:'center', padding:'0 0 0 24px', position:'sticky', top:0, zIndex:10 }}>
          <div style={{ display:'flex', gap:8 }}>
            {[['student','學生端'],['teacher','教師端'],['admin','管理員端']].map(([v,label]) => (
              <button key={v} onClick={() => setView(v)} className={`mui-btn ${view===v?'mui-outlined-primary':'mui-outlined-default'}`} style={{ background:'white', color:view===v?'#0099cc':'#333', border:`1px solid ${view===v?'#0099cc':'#333'}`, borderRadius:4, padding:'4px 10px', fontSize:15, fontWeight:500, cursor:'pointer' }}>{label}</button>
            ))}
          </div>
        </div>

        {/* Toast */}
        {success && (
          <div style={{ position:'fixed', top:88, left:'50%', transform:'translateX(-50%)', zIndex:9999, background:'#EDF7ED', color:'#1E4620', padding:'12px 20px', borderRadius:4, boxShadow:'0 4px 12px rgba(0,0,0,0.15)', minWidth:360, fontSize:16, fontWeight:500, display:'flex', alignItems:'center', gap:8 }}>
            <span style={{ display:'flex', color:'#1E4620' }}><CheckIcon /></span>
            {successMsg}
          </div>
        )}

        {/* Content row */}
        <div style={{ display:'flex', flex:1 }}>
          <div style={{ width:190, background:'white', flexShrink:0 }} />
          <div style={{ flex:1, minWidth:0 }}>
          {view==='student' ? (
            <StudentView application={studentApp} onSubmit={handleStudentSubmit} courseSettings={courseSettings} />
          ) : view==='admin' ? (
            <div style={{ padding:'24px 24px 64px' }}>
              {adminView==='list' && (
                <AdminListView
                  courses={adminCourses}
                  setCourses={setAdminCourses}
                  semester={adminSemester}
                  setSemester={setAdminSemester}
                  cSearch={adminCSearch}
                  setCSearch={setAdminCSearch}
                  onEdit={c => { setAdminCurCourse(c); setAdminView('edit'); }}
                  onAdd={() => setAdminAddOpen(true)}
                  onToggle={adminToggleCourse}
                  appCounts={adminAppCounts}
                />
              )}
              {adminView==='edit' && adminCurCourse && (
                <AdminEditView
                  course={adminCurCourse}
                  secs={adminGetSecs(adminCurCourse.id)}
                  onUpdateSec={(updatedSec) => {
                    const cur = adminGetSecs(adminCurCourse.id);
                    adminSaveSecs(adminCurCourse.id, cur.map(s => s.id===updatedSec.id ? updatedSec : s));
                  }}
                  onUpdate={newSecs => adminSaveSecs(adminCurCourse.id, newSecs)}
                  onEditSec={sec => setAdminSecDlg(sec)}
                  onBatchSecs={secs => setAdminBatchSecs(secs)}
                  onBatchClose={secs => setAdminBatchCloseConf(secs)}
                  onBack={() => setAdminView('list')}
                  showToast={adminShowToast}
                />
              )}
            </div>
          ) : (
            <div style={{ padding:'24px 24px 64px' }}>
              <h1 style={{ fontSize:32, fontWeight:400, color:'#333', marginBottom:8, letterSpacing:'-1.5px' }}>停修申請</h1>
              <p style={{ fontSize:12, color:'black', marginBottom:16 }}>您尚有 <span style={{ color:'#cc0000' }}>{pendingCount}</span> 筆停修申請尚未審核（含逾期審核）</p>

              {/* Filter row */}
              <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:12, gap:12 }}>
                <div style={{ display:'flex', gap:24, alignItems:'flex-start' }}>
                  <MuiTextField
                    label="學生姓名"
                    value={searchName}
                    onChange={e => setSearchName(e.target.value)}
                    style={{ width:220 }}
                  />
                  <MuiSelect label="班別" value={classFilter} onChange={v => setClassFilter(v)} options={classOptions} width={220} />
                  <MuiSelect label="審核結果" value={statusFilter} onChange={v => setStatusFilter(v)} options={statusOptions} width={220} />
                </div>
                <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                  {frozenOrder && (
                    <button onClick={() => { setFrozenOrder(null); setSelected([]); }} className="mui-btn mui-outlined-default" style={{ color:'#555', border:'1px solid rgba(0,0,0,0.23)', background:'transparent', borderRadius:4, padding:'6px 14px', fontSize:14, cursor:'pointer', display:'flex', alignItems:'center', gap:6 }}>
                      <RefreshIcon /> 重新整理
                    </button>
                  )}
                  <ExportSplitButton allRows={exportAllRows} filteredRows={exportFilteredRows} />
                </div>
              </div>

              {/* Action bar */}
              <div style={{ display:'flex', alignItems:'center', gap:16, marginBottom:12 }}>
                <span style={{ fontSize:14, fontWeight:500, color:'#333' }}>已選取 {selected.length} 名學生</span>
                <button disabled={!hasSelections} onClick={() => batchClick('同意')} className="mui-btn mui-outlined-success" style={{ color:hasSelections?'#008a00':'rgba(0,0,0,0.38)', border:`1px solid ${hasSelections?'rgba(0,138,0,0.5)':'rgba(0,0,0,0.12)'}`, background:'transparent', borderRadius:4, padding:'4px 10px', fontSize:13, fontWeight:500, cursor:hasSelections?'pointer':'default' }}>
                  同意停修
                </button>
                <button disabled={!hasSelections} onClick={() => batchClick('不同意')} className="mui-btn mui-outlined-error" style={{ color:hasSelections?'#cc0000':'rgba(0,0,0,0.38)', border:`1px solid ${hasSelections?'rgba(204,0,0,0.5)':'rgba(0,0,0,0.12)'}`, background:'transparent', borderRadius:4, padding:'4px 10px', fontSize:13, fontWeight:500, cursor:hasSelections?'pointer':'default' }}>
                  不同意停修
                </button>
              </div>

              {/* Table — column order: 申請學生 班別 學號 申請時間 停修原因 審核結果 審核期限 核准時間 核准人 */}
              <div style={{ border:'1px solid rgba(0,0,0,0.12)', overflow:'auto', maxHeight:'calc(100vh - 300px)' }}>
                <table style={{ width:'100%', tableLayout:'fixed', borderCollapse:'collapse', minWidth:1074 }}>

                  <thead>
                    <tr>
                      <th style={{ padding:'8px', width:58, textAlign:'center', borderBottom:'1px solid rgba(0,0,0,0.12)', background:'#f5f5f5', position:'sticky', top:0, zIndex:2 }}>
                        <input type="checkbox" checked={allSelected} ref={el => { if (el) el.indeterminate = someSelected; }} onChange={handleSelectAll} style={{ accentColor:'#0099cc' }} />
                      </th>
                      {[
                        ['學生姓名', 100],['班別', 110],['學號', 128],['申請時間', 96],
                        ['停修原因', 160],['審核結果', 100],['審核期限', 96],['審核時間', 96],
                        ['審核人', 80],['審核', 50],
                      ].map(([h, w]) => (
                        <th key={h} style={{ padding:'8px', textAlign: h==='審核'?'center':'left', fontSize:14, fontWeight:500, color:'#333', borderBottom:'1px solid rgba(0,0,0,0.12)', background:'#f5f5f5', position:'sticky', top:0, zIndex:2, ...(h==='停修原因' ? { minWidth:w } : { width:w }), whiteSpace:'nowrap' }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.length === 0 ? (
                      <tr>
                        <td colSpan={11} style={{ padding:'32px 8px', textAlign:'center', fontSize:14, color:'#333' }}>
                          {statusFilter==='待審核' && students.filter(s => s.status==='待審核').length===0
                            ? '目前沒有需審核的學生'
                            : '找不到符合條件的學生'
                          }
                        </td>
                      </tr>
                    ) : filtered.map(s => (
                      <tr key={s.id} style={{ height:72, background: isSelected(s.id) ? 'rgba(0,153,204,0.08)' : 'transparent' }}>
                        <td style={{ padding:'8px', textAlign:'center', borderBottom:'1px solid rgba(0,0,0,0.06)' }}>
                          {s.status!=='逾期審核' && <input type="checkbox" checked={isSelected(s.id)} onChange={() => toggleSelect(s.id)} style={{ accentColor:'#0099cc' }} />}
                        </td>
                        {/* 申請學生 */}
                        <td style={{ padding:'8px', fontSize:14, color:'#333', borderBottom:'1px solid rgba(0,0,0,0.06)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{s.name}</td>
                        {/* 班別 — 字元過長時換行顯示，不做省略號隱藏 */}
                        <td style={{ padding:'8px', fontSize:14, color:'#333', borderBottom:'1px solid rgba(0,0,0,0.06)', whiteSpace:'normal', wordBreak:'break-word', overflowWrap:'break-word' }}>{s.school}</td>
                        {/* 學號 — 字元過長時換行顯示，不做省略號隱藏 */}
                        <td style={{ padding:'8px', fontSize:14, color:'#333', borderBottom:'1px solid rgba(0,0,0,0.06)', whiteSpace:'normal', wordBreak:'break-word', overflowWrap:'break-word' }}>{s.studentId}</td>
                        {/* 申請時間 */}
                        <td style={{ padding:'8px', borderBottom:'1px solid rgba(0,0,0,0.06)', verticalAlign:'middle' }}><DateTimeCell value={s.applyTime} /></td>
                        {/* 停修原因 */}
                        <td style={{ padding:'8px', borderBottom:'1px solid rgba(0,0,0,0.06)', overflow:'hidden' }}>
                          <TruncatedReason text={s.reason} onReadMore={() => openReview(s)} />
                        </td>
                        {/* 審核結果 */}
                        <td style={{ padding:'8px', borderBottom:'1px solid rgba(0,0,0,0.06)' }}>
                          <StatusChip status={s.status==='同意'?'同意':s.status==='不同意'?'不同意':s.status} label={s.status==='同意'?'同意':s.status==='不同意'?'不同意':s.status} />
                        </td>
                        {/* 審核期限：原本就是逾期審核的學生顯示歷史截止日，其他顯示 admin 當前設定 */}
                        <td style={{ padding:'8px', borderBottom:'1px solid rgba(0,0,0,0.06)', verticalAlign:'middle' }}><DateTimeCell value={s._orig === '逾期審核' ? s.deadline : getSecForSchool(s.school).ad} /></td>
                        {/* 審核時間 */}
                        <td style={{ padding:'8px', borderBottom:'1px solid rgba(0,0,0,0.06)', verticalAlign:'middle' }}><DateTimeCell value={s.approvalTime || ''} /></td>
                        {/* 審核人 — 字元過長時換行顯示，不做省略號隱藏 */}
                        <td style={{ padding:'8px', fontSize:14, color:'#333', borderBottom:'1px solid rgba(0,0,0,0.06)', whiteSpace:'normal', wordBreak:'break-word', overflowWrap:'break-word' }}>{s.approver || ''}</td>
                        {/* 審核 — 鉛筆 IconButton（逾期審核也顯示） */}
                        <td style={{ padding:'8px', borderBottom:'1px solid rgba(0,0,0,0.06)', textAlign:'center', verticalAlign:'middle' }}>
                          <button onClick={() => openReview(s)} style={{ background:'none', border:'none', cursor:'pointer', padding:5, display:'inline-flex', alignItems:'center', justifyContent:'center', borderRadius:'50%', color:'rgba(0,0,0,0.54)' }}>
                            <EditIcon size={20} />
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>

      {/* ── Confirm override dialog ── */}
      {confirmOpen && (
        <div onClick={() => setConfirmOpen(false)} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.5)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:100 }}>
          <div onClick={e => e.stopPropagation()} style={{ background:'white', borderRadius:8, width:600, height:570, boxShadow:'0 8px 32px rgba(0,0,0,0.2)', display:'flex', flexDirection:'column', overflow:'hidden' }}>
            {/* Title */}
            <div style={{ padding:'16px 24px', borderBottom:'1px solid rgba(0,0,0,0.12)', flexShrink:0 }}>
              <h2 style={{ fontSize:20, fontWeight:500, color:'#333', margin:0 }}>
                {pendingStatus === '同意' ? '批次同意停修' : '批次不同意停修'}
              </h2>
            </div>
            {/* Content */}
            <div style={{ flex:1, padding:'16px 24px', display:'flex', flexDirection:'column', gap:16, overflowY:'auto' }}>
              <p style={{ fontSize:16, color:'#333', lineHeight:1.6, margin:0 }}>
                您即將對所選取的學生批次審核「{pendingStatus === '同意' ? '同意停修' : '不同意停修'}」。
              </p>
              <p style={{ fontSize:16, color:'#333', lineHeight:1.6, margin:0 }}>
                尚無審核結果的學生，將新增「{pendingStatus === '同意' ? '同意' : '不同意'}」審核狀態及下方填寫的評語；已有審核結果的學生，現有狀態與評語將被覆蓋。
              </p>
              <p style={{ fontSize:16, color:'#333', lineHeight:1.6, margin:0 }}>確定要繼續嗎？</p>
              <div style={{ display:'flex', flexDirection:'column', gap:4, flex:1 }}>
                <MuiTextField multiline fillHeight label="審核評語 (選填)" value={batchComment} onChange={e => setBatchComment(e.target.value)} error={batchComment.length>500} style={{ flex:1 }} />
                <p style={{ fontSize:12, color: batchComment.length>500 ? '#CC0000' : 'rgba(51,51,51,0.6)', textAlign:'right', margin:0, flexShrink:0 }}>{batchComment.length} / 500</p>
              </div>
            </div>
            {/* Actions */}
            <div style={{ padding:8, display:'flex', justifyContent:'flex-end', gap:8, flexShrink:0, borderTop:'1px solid rgba(0,0,0,0.12)' }}>
              <button onClick={() => setConfirmOpen(false)} className="mui-btn mui-text-primary" style={{ background:'transparent', color:'#0099cc', border:'none', borderRadius:4, padding:'6px 8px', fontSize:16, fontWeight:500, cursor:'pointer' }}>取消</button>
              <button disabled={batchComment.length>500} onClick={() => { execBatch(pendingStatus, batchComment); setConfirmOpen(false); }} className="mui-btn mui-contained-primary" style={{ background:batchComment.length>500?'rgba(0,0,0,0.12)':'#0099cc', color:batchComment.length>500?'rgba(0,0,0,0.38)':'white', border:'none', borderRadius:4, padding:'6px 16px', fontSize:16, fontWeight:500, cursor:batchComment.length>500?'default':'pointer' }}>確定</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Student success toast ── */}
      {studentToast && (
        <div style={{position:'fixed',top:96,left:0,right:0,zIndex:500,display:'flex',justifyContent:'center',pointerEvents:'none'}}>
          <div style={{pointerEvents:'auto',width:400,background:'#EDF7ED',borderRadius:4,padding:'6px 16px',display:'flex',flexDirection:'row',alignItems:'center',boxShadow:'0 3px 8px rgba(0,0,0,0.18)'}}>
            <div style={{padding:'7px 12px 7px 0',display:'flex',flexShrink:0}}>
              <CheckCircleIcon size={22} color="#008A00" />
            </div>
            <div style={{flex:1,padding:'8px 0'}}>
              <span style={{fontSize:16,fontWeight:500,color:'#1E4620',lineHeight:'150%',letterSpacing:'0.015em'}}>已成功送出停修申請</span>
            </div>
            <div style={{padding:'4px 0 0 16px',flexShrink:0}}>
              <button onClick={() => setStudentToast(false)} style={{background:'none',border:'none',cursor:'pointer',padding:5,display:'flex',color:'#1E4620'}}>
                <CloseIcon size={18} color="#1E4620" />
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── Admin toast ── */}
      {adminToast && <AdminToast msg={adminToast} onClose={() => setAdminToast(null)} />}

      {/* ── Admin AddDlg ── */}
      {adminAddOpen && (
        <AddDlg
          courses={adminCourses}
          onClose={() => setAdminAddOpen(false)}
          onDone={({ courses: newCs, st, et, ap, notes }) => {
            const added = newCs.map(c => ({ ...c, id: String(Date.now() + Math.random()) }));
            setAdminCourses(prev => [...added, ...prev]);
            added.forEach(c => {
              setAdminCS(prev => ({ ...prev, [c.id]: mkSecs(toDsp(st), toDsp(et), toDsp(ap), notes) }));
            });
            setAdminAddOpen(false);
            adminShowToast('已成功開啟課程停修功能');
          }}
        />
      )}

      {/* ── Admin SecDlg ── */}
      {adminSecDlg && adminCurCourse && (
        <SecDlg
          sec={adminSecDlg}
          onClose={() => setAdminSecDlg(null)}
          onSave={updatedSec => {
            const cur = adminGetSecs(adminCurCourse.id);
            adminSaveSecs(adminCurCourse.id, cur.map(s => s.id===updatedSec.id ? updatedSec : s));
            setAdminSecDlg(null);
            adminShowToast('已成功儲存班別設定');
          }}
        />
      )}

      {/* ── Admin BatchDlg ── */}
      {adminBatchSecs && adminCurCourse && (
        <BatchDlg
          secs={adminBatchSecs}
          onClose={() => setAdminBatchSecs(null)}
          onSave={updatedSecs => {
            const ids = new Set(updatedSecs.map(s => s.id));
            const cur = adminGetSecs(adminCurCourse.id);
            adminSaveSecs(adminCurCourse.id, cur.map(s => ids.has(s.id) ? (updatedSecs.find(u => u.id===s.id) || s) : s));
            setAdminBatchSecs(null);
            adminShowToast('已成功儲存班別設定');
          }}
        />
      )}

      {/* ── Admin BatchClose confirm ── */}
      {adminBatchCloseConf && adminCurCourse && (
        <AdminConfirmDlg
          title="即將關閉班別停修功能"
          body="欲關閉的班別中已有停修申請，您確定要關閉？"
          onCancel={() => setAdminBatchCloseConf(null)}
          onConfirm={() => {
            const ids = new Set(adminBatchCloseConf.map(s => s.id));
            const cur = adminGetSecs(adminCurCourse.id);
            adminSaveSecs(adminCurCourse.id, cur.map(s => ids.has(s.id) ? { ...s, vis:false } : s));
            setAdminBatchCloseConf(null);
            adminShowToast('已成功關閉班別停修功能');
          }}
        />
      )}

      {/* ── Admin homepage course-level switch close confirm ── */}
      {adminCourseCloseConf && (
        <AdminConfirmDlg
          title="即將關閉課程停修功能"
          body="您即將關閉此班別的停修申請功能。您確定要繼續嗎？"
          onCancel={() => setAdminCourseCloseConf(null)}
          onConfirm={() => {
            setAdminCourses(prev => prev.map(x => x.id===adminCourseCloseConf.id ? {...x, vis:false} : x));
            setAdminCourseCloseConf(null);
            adminShowToast('已成功關閉課程停修功能');
          }}
        />
      )}

      {/* ── Single review dialog (w600 h570) ── */}
      {reviewOpen && currentStudent && (
        <div onClick={closeReview} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.5)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:100 }}>
          <div onClick={e => e.stopPropagation()} style={{ background:'white', borderRadius:8, width:600, height:570, boxShadow:'0 8px 32px rgba(0,0,0,0.2)', display:'flex', flexDirection:'column', overflow:'hidden' }}>
            {/* Fixed title */}
            <div style={{ padding:'24px 24px 16px', flexShrink:0, borderBottom:'1px solid rgba(0,0,0,0.12)' }}>
              <h2 style={{ fontSize:20, fontWeight:500, color:'#333' }}>停修申請單</h2>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:16, flex:1, overflowY:'auto', padding:'0 24px 8px' }}>
              <p style={{ fontSize:16, color:'#333', lineHeight:1.5 }}>課程名稱：深度學習 Deep Learning</p>
              <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
                <p style={{ fontSize:12, color:'#333', lineHeight:1.66 }}>學生姓名：{currentStudent.name}</p>
                <p style={{ fontSize:12, color:'#333', lineHeight:1.66 }}>班別：{currentStudent.school}</p>
                <p style={{ fontSize:12, color:'#333', lineHeight:1.66 }}>登入ID：{currentStudent.loginId}</p>
                <p style={{ fontSize:12, color:'#333', lineHeight:1.66 }}>學號：{currentStudent.studentId.replace(/^.*_/, '')}</p>
              </div>
              <div>
                <p style={{ fontSize:12, color:'#333', lineHeight:1.66, marginBottom:8 }}>停修原因：</p>
                <div style={{ background:'#f5f5f5', border:'1px solid rgba(0,0,0,0.23)', borderRadius:4, padding:12, height:100, overflowY:'auto' }}>
                  <p style={{ fontSize:12, color:'rgba(51,51,51,0.6)', lineHeight:1.66 }}>{currentStudent.reason}</p>
                </div>
              </div>

              {currentStudent.status==='逾期審核' && (
                <div style={{ background:'#FFF4E5', borderRadius:4, padding:'6px 16px', display:'flex', gap:8, alignItems:'flex-start' }}>
                  <WarningIcon size={22} color="#663C00" style={{marginTop:2,flexShrink:0}}/>
                  <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
                    <p style={{ fontSize:16, fontWeight:500, color:'#663C00', lineHeight:1.5, margin:0 }}>學生所屬班別的審核期限已過</p>
                    <p style={{ fontSize:14, fontWeight:400, color:'#663C00', lineHeight:1.43, margin:0 }}>若需要調整學生申請狀態，請聯繫 COOL 團隊。</p>
                  </div>
                </div>
              )}

              {currentStudent.status!=='逾期審核' && (
                <>
                  <div>
                    <p style={{ fontSize:14, fontWeight:500, color:'rgba(51,51,51,0.6)', marginBottom:8 }}>教師回覆</p>
                    <MuiSelect
                      label="審核結果"
                      value={dlgStatus==='' ? '' : dlgStatus==='同意' ? '同意停修' : '不同意停修'}
                      onChange={v => {
                        if (v==='同意停修') { setDlgStatus('同意'); if (initDlgStatus!=='') setDlgComment(''); }
                        else if (v==='不同意停修') { setDlgStatus('不同意'); if (initDlgStatus!=='') setDlgComment(''); }
                      }}
                      options={reviewStatusOptions}
                      width={220}
                    />
                  </div>
                  <div>
                    <MuiTextField multiline rows={3} label="審核評語 (選填)" value={dlgComment} onChange={e => setDlgComment(e.target.value)} error={dlgComment.length>500} />
                    <p style={{ fontSize:12, color: dlgComment.length>500 ? '#CC0000' : 'rgba(51,51,51,0.6)', textAlign:'right', marginTop:4 }}>{dlgComment.length} / 500</p>
                  </div>
                </>
              )}
            </div>

            {/* Fixed action bar */}
            <div style={{ display:'flex', justifyContent:'flex-end', gap:8, padding:'16px 24px 24px', flexShrink:0, borderTop:'1px solid rgba(0,0,0,0.12)' }}>
              <button onClick={closeReview} className="mui-btn mui-outlined-default" style={{ background:'transparent', color:'#666', border:'1px solid rgba(0,0,0,0.23)', borderRadius:4, padding:'6px 20px', fontSize:14, cursor:'pointer' }}>取消</button>
              <button disabled={submitDisabled} onClick={submitReview} className="mui-btn mui-contained-primary" style={{ background:submitDisabled?'rgba(0,0,0,0.12)':'#0099cc', color:submitDisabled?'rgba(0,0,0,0.38)':'white', border:'none', borderRadius:4, padding:'6px 20px', fontSize:14, fontWeight:500, cursor:submitDisabled?'default':'pointer' }}>送出回覆</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
